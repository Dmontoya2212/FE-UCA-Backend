spring:
  application:
    name: facturacion

  datasource:
    url: ${DB_URL:}
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver

    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 30000
      max-lifetime: 1800000

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: true
    clean-disabled: true

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

server:
  port: ${SERVER_PORT:8080}

logging:
  pattern:
    level: "%5p [traceId=%X{traceId}]"
  level:
    org.hibernate.SQL: ${LOG_SQL_LEVEL:WARN}
    org.hibernate.type.descriptor.sql.BasicBinder: ${LOG_SQL_BIND_LEVEL:WARN}

jwt:
  secret: ${JWT_SECRET:}
  expiration-ms: ${JWT_EXPIRATION_MS:900000}
  issuer: ${JWT_ISSUER:feuca-facturacion}

security:
  require-https: ${SECURITY_REQUIRE_HTTPS:false}
  rate-limit:
    login:
      max-attempts: ${LOGIN_RATE_LIMIT_MAX_ATTEMPTS:5}
      window-seconds: ${LOGIN_RATE_LIMIT_WINDOW_SECONDS:300}
    emission:
      max-attempts: ${EMISSION_RATE_LIMIT_MAX_ATTEMPTS:10}
      window-seconds: ${EMISSION_RATE_LIMIT_WINDOW_SECONDS:60}
  secrets:
    encryption-key: ${SECRET_ENCRYPTION_KEY:}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}
    allowed-methods: ${CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}
  database-initializer:
    enabled: ${DATABASE_INITIALIZER_ENABLED:false}

dte:
  ambiente: ${DTE_AMBIENTE:}

hacienda:
  endpoint: ${HACIENDA_ENDPOINT:}
  simulation-enabled: ${HACIENDA_SIMULATION_ENABLED:false}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  metrics:
    tags:
      application: ${spring.application.name}

monitoring:
  invoices:
    sending-stale-minutes: ${MONITORING_SENDING_STALE_MINUTES:15}
