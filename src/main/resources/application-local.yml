spring:
  config:
    activate:
      on-profile: local

  datasource:
    url: ${LOCAL_DB_URL:jdbc:postgresql://localhost:5432/facturacion_electronica_db}
    username: ${LOCAL_DB_USERNAME:postgres}
    password: ${LOCAL_DB_PASSWORD:}

  jpa:
    show-sql: ${LOCAL_SHOW_SQL:true}

logging:
  level:
    org.hibernate.SQL: ${LOCAL_LOG_SQL_LEVEL:DEBUG}
    org.hibernate.type.descriptor.sql.BasicBinder: ${LOCAL_LOG_SQL_BIND_LEVEL:TRACE}

app:
  cors:
    allowed-origins: ${LOCAL_CORS_ALLOWED_ORIGINS:http://localhost:5173}

jwt:
  secret: ${LOCAL_JWT_SECRET:d0a124ca4adb62b1ed06b4aa632f2825fe44cedbb64c9b42dc7fac5df6d23382}
  expiration-ms: ${LOCAL_JWT_EXPIRATION_MS:900000}
  issuer: ${LOCAL_JWT_ISSUER:feuca-facturacion-local}

security:
  secrets:
    encryption-key: ${LOCAL_SECRET_ENCRYPTION_KEY:d0a124ca4adb62b1ed06b4aa632f2825fe44cedbb64c9b42dc7fac5df6d23382}

dte:
  ambiente: ${LOCAL_DTE_AMBIENTE:00}

hacienda:
  endpoint: ${LOCAL_HACIENDA_ENDPOINT:http://localhost:8080}
  simulation-enabled: ${LOCAL_HACIENDA_SIMULATION_ENABLED:false}
