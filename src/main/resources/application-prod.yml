spring:
  config:
    activate:
      on-profile: prod

  devtools:
    restart:
      enabled: false

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    show-sql: false

logging:
  level:
    root: INFO
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN

server:
  forward-headers-strategy: framework
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  database-initializer:
    enabled: false

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: ${JWT_EXPIRATION_MS:900000}
  issuer: ${JWT_ISSUER}

security:
  require-https: true
  rate-limit:
    login:
      max-attempts: ${LOGIN_RATE_LIMIT_MAX_ATTEMPTS:5}
      window-seconds: ${LOGIN_RATE_LIMIT_WINDOW_SECONDS:300}
    emission:
      max-attempts: ${EMISSION_RATE_LIMIT_MAX_ATTEMPTS:10}
      window-seconds: ${EMISSION_RATE_LIMIT_WINDOW_SECONDS:60}
  secrets:
    encryption-key: ${SECRET_ENCRYPTION_KEY}

dte:
  ambiente: ${DTE_AMBIENTE}

hacienda:
  endpoint: ${HACIENDA_ENDPOINT}
  simulation-enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  metrics:
    tags:
      application: ${spring.application.name}

monitoring:
  invoices:
    sending-stale-minutes: ${MONITORING_SENDING_STALE_MINUTES:15}
