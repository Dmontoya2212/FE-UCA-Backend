spring:
  config:
    activate:
      on-profile: test

  datasource:
    url: ${TEST_DB_URL:jdbc:postgresql://localhost:5432/facturacion_electronica_db}
    username: ${TEST_DB_USERNAME:postgres}
    password: ${TEST_DB_PASSWORD:}

  jpa:
    show-sql: false

logging:
  level:
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN

app:
  cors:
    allowed-origins: ${TEST_CORS_ALLOWED_ORIGINS:http://localhost:5173}

jwt:
  secret: ${TEST_JWT_SECRET:d0a124ca4adb62b1ed06b4aa632f2825fe44cedbb64c9b42dc7fac5df6d23382}
  expiration-ms: ${TEST_JWT_EXPIRATION_MS:900000}
  issuer: ${TEST_JWT_ISSUER:feuca-test}

security:
  secrets:
    encryption-key: ${TEST_SECRET_ENCRYPTION_KEY:d0a124ca4adb62b1ed06b4aa632f2825fe44cedbb64c9b42dc7fac5df6d23382}

dte:
  ambiente: ${TEST_DTE_AMBIENTE:00}

hacienda:
  endpoint: ${TEST_HACIENDA_ENDPOINT:http://localhost:8080}
  simulation-enabled: false
